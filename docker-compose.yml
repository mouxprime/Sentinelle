version: '3.8'

services:
  # PostgreSQL Database with PostGIS
  database:
    image: postgis/postgis:16-3.4-alpine
    container_name: osint-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-osint_aggregator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - osint-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and message queue
  redis:
    image: redis:7-alpine
    container_name: osint-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - osint-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Backend - OSINT Aggregator
  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    container_name: osint-aggregator
    restart: unless-stopped
    environment:
      # Database
      - POSTGRES_USER=${POSTGRES_USER:-osint}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-osint_aggregator}
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      # LLM Configuration
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5-7b-instruct}

      # Mapbox
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}

      # Telegram
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - TELEGRAM_CHANNELS=${TELEGRAM_CHANNELS}

      # RSS
      - RSS_FEEDS=${RSS_FEEDS}

      # Discord (optional)
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNELS=${DISCORD_CHANNELS}

      # FlightRadar (optional)
      - FLIGHTRADAR_ENABLED=${FLIGHTRADAR_ENABLED:-false}
      - FLIGHTRADAR_BOUNDS=${FLIGHTRADAR_BOUNDS}

      # MarineTraffic (optional)
      - MARINETRAFFIC_ENABLED=${MARINETRAFFIC_ENABLED:-false}
      - MARINETRAFFIC_API_KEY=${MARINETRAFFIC_API_KEY}

      # Scheduler
      - COLLECTION_INTERVAL_MINUTES=${COLLECTION_INTERVAL_MINUTES:-5}
      - PROCESSING_INTERVAL_MINUTES=${PROCESSING_INTERVAL_MINUTES:-2}
    volumes:
      - ./aggregator/sessions:/app/sessions  # Telegram session files
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${AGGREGATOR_PORT:-8000}:8000"
    networks:
      - osint-network
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access LM Studio on host
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: osint-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_TOKEN}
      - NEXT_PUBLIC_API_URL=http://aggregator:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-osint}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-osint_aggregator}
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - osint-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: osint-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - frontend
      - aggregator
    networks:
      - osint-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  osint-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
